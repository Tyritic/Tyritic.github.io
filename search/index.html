<script>
    
    document.addEventListener('DOMContentLoaded', function() {
        const searchForm = document.querySelector('.search-form');
        const searchInput = searchForm.querySelector('input');
        const searchResultList = document.querySelector('.search-result--list');
        const searchResultEmpty = document.querySelector('.search-result--empty');
        const searchResultTitle = document.querySelector('.search-result--title');

        
        searchInput.addEventListener('input', function() {
            if (this.value.trim() === '') {
                searchResultEmpty.style.display = 'none';
            }
        });

        
        setInterval(function() {
            const hasResults = searchResultList.children.length > 0;
            const hasSearchTerm = searchInput.value.trim() !== '';
            const hasTitle = searchResultTitle.textContent.trim() !== '';

            if (hasSearchTerm && hasTitle && !hasResults) {
                searchResultEmpty.style.display = 'block';
            } else {
                searchResultEmpty.style.display = 'none';
            }
        }, 100);
    });
</script>
